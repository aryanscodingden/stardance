upcoming:
  title: "Intro to PCB design"
  description: "Design your first PCB with us."
  starts_at: <%= 2.days.from_now %>
  ends_at: <%= 2.days.from_now + 1.hour %>

joinable:
  title: "Ship your first project"
  description: "Live shipping session."
  zoom_link: "https://zoom.us/j/987654321"
  starts_at: <%= 10.minutes.from_now %>
  ends_at: <%= 70.minutes.from_now %>

ended:
